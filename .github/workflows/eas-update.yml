name: EAS Update

on:
  workflow_dispatch: {}

jobs:
  update:
    name: Publish EAS Update
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
          packager: npm

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Publish Update
        working-directory: ./frontend
        run: |
          eas update --auto --branch production --message "Update from GitHub Actions"
